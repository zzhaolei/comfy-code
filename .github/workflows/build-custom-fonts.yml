name: Build Custom Iosevka Fonts

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Fonts and Create Release
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install ttfautohint
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ttfautohint

      - name: Resolve Font Families
        id: families
        shell: bash
        run: |
          cd get-all-families-in-private-build-plan
          npm install
          line="$(node ./index.mjs)"
          json="${line#fontFamilies=}"
          families="$(node -e 'const arr=JSON.parse(process.argv[1]); console.log(arr.join(" "));' "$json")"
          if [[ -z "$families" ]]; then
            echo "No build plans found in private-build-plans.toml" >&2
            exit 1
          fi
          echo "list=$families" >> "$GITHUB_OUTPUT"

      - name: Read Iosevka Version
        id: iosevka-version
        shell: bash
        run: |
          if [[ -f IOSEVKA_VERSION ]]; then
            version="$(tr -d ' \t\n\r' < IOSEVKA_VERSION)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Checkout Iosevka Repository (pinned)
        if: steps.iosevka-version.outputs.version != ''
        uses: actions/checkout@v5
        with:
          repository: be5invis/iosevka
          path: iosevka
          ref: ${{ steps.iosevka-version.outputs.version }}

      - name: Checkout Iosevka Repository (default)
        if: steps.iosevka-version.outputs.version == ''
        uses: actions/checkout@v5
        with:
          repository: be5invis/iosevka
          path: iosevka

      - name: Copy Custom Build Plans
        shell: bash
        run: |
          cp private-build-plans.toml iosevka/private-build-plans.toml

      - name: Build Fonts
        shell: bash
        working-directory: iosevka
        run: |
          npm install
          for plan in ${{ steps.families.outputs.list }}; do
            npm run build -- ttf::${plan}
          done

      - name: Prepare TTF Zip (Comfy Code)
        shell: bash
        run: |
          families=(${{ steps.families.outputs.list }})
          if [[ ${#families[@]} -eq 1 ]]; then
            src="iosevka/dist/${families[0]}/TTF"
            mv "$src" "Comfy Code"
          else
            mkdir -p "Comfy Code"
            for plan in "${families[@]}"; do
              src="iosevka/dist/${plan}/TTF"
              if [[ -d "$src" ]]; then
                cp -R "$src/." "Comfy Code/"
              fi
            done
          fi
          zip -r "Comfy Code-ttf.zip" "Comfy Code"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow

      - name: Generate Specimen and Weight Images
        shell: bash
        run: |
          python <<'PY'
          from __future__ import annotations

          import re
          from pathlib import Path

          from PIL import Image, ImageDraw, ImageFont

          FONT_ROOT = Path("Comfy Code")
          OUTPUT_DIR = Path("images")
          OUTPUT_DIR.mkdir(parents=True, exist_ok=True)

          ttf_files = sorted(FONT_ROOT.rglob("*.ttf"))
          if not ttf_files:
            raise SystemExit("No TTF files found in Comfy Code.")

          regular_files = [p for p in ttf_files if p.name.endswith("-Regular.ttf")]
          base_font = regular_files[0] if regular_files else ttf_files[0]
          family = base_font.name.split("-")[0]
          display_name = re.sub(r"(?<!^)([A-Z])", r" \1", family)

          def load_font(path: Path, size: int) -> ImageFont.FreeTypeFont:
            return ImageFont.truetype(str(path), size)

          def draw_centered(draw: ImageDraw.ImageDraw, text: str, y: int, font: ImageFont.FreeTypeFont, width: int) -> int:
            bbox = draw.textbbox((0, 0), text, font=font)
            text_width = bbox[2] - bbox[0]
            x = int((width - text_width) / 2)
            draw.text((x, y), text, font=font, fill="black")
            return int(y + font.size * 1.4)

          # Specimen image
          specimen_size = (1600, 900)
          specimen = Image.new("RGB", specimen_size, "white")
          specimen_draw = ImageDraw.Draw(specimen)

          title_font = load_font(base_font, 72)
          body_font = load_font(base_font, 40)
          small_font = load_font(base_font, 32)

          y = 80
          y = draw_centered(specimen_draw, f"{display_name}", y, title_font, specimen_size[0])
          y += 20
          specimen_lines = [
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
            "abcdefghijklmnopqrstuvwxyz",
            "0123456789",
            "!@#$%^&*()[]{}<>?/\\|+-=_;:,.\"'",
          ]
          for line in specimen_lines:
            y = draw_centered(specimen_draw, line, y, body_font, specimen_size[0])
          y += 10
          draw_centered(specimen_draw, "Regular", y, small_font, specimen_size[0])

          specimen_path = OUTPUT_DIR / "specimen.png"
          specimen.save(specimen_path)

          # Weight image
          weight_size = (1600, 900)
          weight_image = Image.new("RGB", weight_size, "white")
          weight_draw = ImageDraw.Draw(weight_image)

          weight_title_font = load_font(base_font, 60)
          label_font = load_font(base_font, 28)
          pangram = "A quick brown fox jumps over the lazy dog."

          entries = [
            ("Regular", f"{family}-Regular.ttf"),
            ("Regular Italic", f"{family}-Italic.ttf"),
            ("Medium", f"{family}-Medium.ttf"),
            ("Medium Italic", f"{family}-MediumItalic.ttf"),
            ("Bold", f"{family}-Bold.ttf"),
            ("Bold Italic", f"{family}-BoldItalic.ttf"),
          ]
          weight_fonts = []
          for label, filename in entries:
            candidate = base_font.parent / filename
            if candidate.exists():
              weight_fonts.append((label, candidate))
          if not weight_fonts:
            weight_fonts.append(("Regular", base_font))

          y = 70
          y = draw_centered(weight_draw, f"{display_name}", y, weight_title_font, weight_size[0])
          y += 30
          for weight, font_path in weight_fonts:
            sample_font = load_font(font_path, 44)
            line_height = int(sample_font.size * 1.7)
            weight_draw.text((80, y + 10), weight, font=label_font, fill="black")
            weight_draw.text((250, y), pangram, font=sample_font, fill="black")
            y += line_height

          weight_path = OUTPUT_DIR / "weights.png"
          weight_image.save(weight_path)

          print(f"Saved {specimen_path} and {weight_path}")
          PY

      - name: Compute Next Version
        id: version
        shell: bash
        run: |
          if [[ ! -f VERSION ]]; then
            echo "VERSION file missing" >&2
            exit 1
          fi
          current="$(tr -d ' \t\n\r' < VERSION)"
          if [[ ! "$current" =~ ^v1\.0\.[0-9]+$ ]]; then
            echo "Invalid VERSION format: $current" >&2
            exit 1
          fi
          num="${current##*.}"
          next_num=$((num + 1))
          next="v1.0.${next_num}"
          git fetch --tags --force
          while git rev-parse -q --verify "refs/tags/${next}" >/dev/null; do
            next_num=$((next_num + 1))
            next="v1.0.${next_num}"
          done
          echo "$next" > VERSION
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Commit Version and Images
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION images
          if git diff --cached --quiet; then
            echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: bump version to ${{ steps.version.outputs.next }}"
          git push
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next }}
          name: ${{ steps.version.outputs.next }}
          target_commitish: ${{ steps.commit.outputs.commit }}
          generate_release_notes: true
          files: "Comfy Code-ttf.zip"

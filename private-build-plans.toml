[buildPlans.ComfyCode]
family = "Comfy Code"
spacing = "term"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

[buildPlans.ComfyCode.variants.design]
two = "straight-neck-serifless"
three = "flat-top-serifless"
five = "oblique-arched-serifless"
six = "open-contour"
eight = "two-circles"
nine = "open-contour"
zero = "long-dotted"
capital-d = "more-rounded-serifless"
capital-g = "toothless-rounded-serifless-hooked"
capital-j = "flat-hook-serifed"
capital-q = "curly-tailed"
f = "flat-hook-serifless-crossbar-at-x-height"
i = "serifed-flat-tailed"
j = "flat-hook-serifed"
l = "serifed-flat-tailed"
r = "hookless-serifless"
t = "flat-hook-short-neck"
u = "toothless-rounded-serifless"
w = "straight-flat-top-serifless"
y = "straight-turn-serifless"
punctuation-dot = "round"
asterisk = "penta-mid"
brace = "straight"
guillemet = "straight"
number-sign = "slanted"
ampersand = "upper-open"
at = "threefold"
percent = "rings-continuous-slash"
question = "smooth"
lig-ltgteq = "slanted"
lig-equal-chain = "without-notch"
lig-hyphen-chain = "without-notch"

[buildPlans.ComfyCode.variants.italic]
a = "single-storey-serifless"
d = "toothed-serifless"
f = "flat-hook-tailed-crossbar-at-x-height"
i = "serifed-flat-tailed"
k = "cursive-serifless"
x = "semi-chancery-straight-serifless"
y = "cursive-flat-hook-serifless"

[buildPlans.ComfyCode.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.ComfyCode.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.ComfyCode.weights.Thin]
shape = 100
menu = 100
css = 100

[buildPlans.ComfyCode.weights.ExtraLight]
shape = 200
menu = 200
css = 200

[buildPlans.ComfyCode.weights.Light]
shape = 300
menu = 300
css = 300

[buildPlans.ComfyCode.weights.Medium]
shape = 500
menu = 500
css = 500

[buildPlans.ComfyCode.weights.SemiBold]
shape = 600
menu = 600
css = 600

[buildPlans.ComfyCode.weights.ExtraBold]
shape = 800
menu = 800
css = 800

[buildPlans.ComfyCode.widths.Normal]
shape = 600
menu = 5
css = "normal"

[buildPlans.ComfyCode.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.ComfyCode.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"

[buildPlans.ComfyCode.ligations]
enables = [
    "arrow-hyphen", "arrow-equal", "exeq", "lteq", "gteq",
    "center-ops", "center-op-trigger-equal-r", "center-op-trigger-equal-l", "center-op-influence-colon",
]

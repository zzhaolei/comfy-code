[buildPlans.ComfyCode]
family = "Comfy Code"
spacing = "term"
serifs = "sans"
noCvSs = true
exportGlyphNames = true

[buildPlans.ComfyCode.variants.design]
two = "straight-neck-serifless"
three = "flat-top-serifless"
five = "oblique-arched-serifless"
eight = "two-circles"
zero = "long-dotted"
capital-d = "more-rounded-serifless"
capital-g = "toothless-rounded-serifless-hooked"
capital-j = "serifless"
capital-q = "straight"
capital-w = "straight-flat-top-serifless"
f = "flat-hook-serifless-crossbar-at-x-height"
g = "single-storey-flat-hook-serifless"
j = "flat-hook-serifed"
r = "hookless-serifless"
t = "flat-hook-short-neck"
u = "toothless-rounded-serifless"
w = "straight-flat-top-serifless"
punctuation-dot = "round"
asterisk = "penta-low"
brace = "straight"
guillemet = "straight"
number-sign = "slanted"
ampersand = "upper-open"
at = "threefold"
percent = "rings-continuous-slash"
question = "corner-flat-hooked"
lig-ltgteq = "slanted"
lig-equal-chain = "without-notch"
lig-hyphen-chain = "without-notch"

[buildPlans.ComfyCode.variants.italic]
d = "toothed-serifless"
f = "flat-hook-tailed-crossbar-at-x-height"
i = "serifed-flat-tailed"
l = "serifed-flat-tailed"
x = "semi-chancery-straight-serifless"
y = "cursive-flat-hook-serifless"

[buildPlans.ComfyCode.widths.Normal]
shape = 600
menu = 5
css = "normal"

[buildPlans.ComfyCode.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.ComfyCode.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"

[buildPlans.ComfyCode.ligations]
enables = [
    "arrow-hyphen", "arrow-equal", "exeq", "exeqeq", "lteq", "gteq",
    "center-ops", "center-op-trigger-equal-r", "center-op-trigger-equal-l", "center-op-influence-colon",
]
